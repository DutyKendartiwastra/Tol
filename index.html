<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tol Solo–Jogja XYZ Tile</title>

  <link
    rel="stylesheet"
    href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
  />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/WebTileLayer",
  "esri/layers/support/TileInfo"
], function(Map, MapView, WebTileLayer, TileInfo) {

  const tileInfo = TileInfo.create({
    spatialReference: { wkid: 3857 },
    size: 256
  });

  const tolLayer = new WebTileLayer({
    urlTemplate:
      "https://dutykendartiwastra.github.io/Tol/tile/{level}/{col}/{row}.png",
    tileInfo: tileInfo,
    spatialReference: { wkid: 3857 }
  });

  const map = new Map({
    basemap: null,
    layers: [tolLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    spatialReference: { wkid: 3857 },
    constraints: {
      minZoom: 14,
      maxZoom: 18
    }
  });

  view.when(() => {
    view.goTo({
      center: [110.95, -7.6],
      zoom: 14
    });
  });

});
  </script>
</body>
</html>
