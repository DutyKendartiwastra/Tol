<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebGIS Tol Solo–Jogja</title>

  <link rel="stylesheet"
    href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
<div id="viewDiv"></div>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/WMSLayer"
], function(Map, MapView, WMSLayer) {

  const tolLayer = new WMSLayer({
    url: "http://localhost:8080/geoserver/keke/wms",
    sublayers: [{
      name: "keke:MOSAIC_WebMercator"
    }]
  });

  const map = new Map({
    basemap: "satellite",
    layers: [tolLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [110.8, -7.55],
    zoom: 14
  });

});
</script>
</body>
</html>
